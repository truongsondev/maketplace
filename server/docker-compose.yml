    networks:
      - graduation-network
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

# ====================================
# Networks
# ====================================
networks:
  graduation-network:
    driver: bridge

# ====================================
# Volumes
# ====================================
