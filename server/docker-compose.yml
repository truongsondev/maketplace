services:
  # ====================================
  # MySQL Database Service
  # ====================================
  mysql:
    image: mysql:8.0
    container_name: graduation-project-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - graduation-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ====================================
  # Redis Cache Service
  # ====================================
  redis:
    image: redis:7-alpine
    container_name: graduation-project-redis
    restart: unless-stopped
    command: redis-server --requirepass root
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - graduation-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'root', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ====================================
  # Node.js Application Service
  # ====================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graduation-project-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      # Database configuration
      DATABASE_URL: 'mysql://root:root@mysql:3306/app_db?allowPublicKeyRetrieval=true&waitForConnections=true&connectionLimit=10&queueLimit=0'
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: app_db
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: root
      # Email configuration (copy from .env.development)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: sonltute@gmail.com
