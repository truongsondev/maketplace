version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: staging-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-staging_password}
      MYSQL_DATABASE: app_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_staging_data:/var/lib/mysql
    networks:
      - staging-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD:-staging_password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: staging-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-staging_redis_pass}
    ports:
      - "6380:6379"
    volumes:
      - redis_staging_data:/data
    networks:
      - staging-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-staging_redis_pass}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        NODE_ENV: staging
    container_name: staging-backend
    restart: always
    environment:
      NODE_ENV: staging
      PORT: 8080
      DATABASE_URL: mysql://root:${DB_PASSWORD:-staging_password}@mysql:3306/app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-staging_redis_pass}
    env_file:
      - ./server/.env.staging
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging-network
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Frontend (React - client-seller)
  admin-client:
    build:
      context: ./client-seller
      dockerfile: Dockerfile
    container_name: staging-admin-client
    restart: always
    environment:
      VITE_API_BASE_URL: http://backend:8080
    ports:
      - "5174:5173"
    depends_on:
      - backend
    networks:
      - staging-network

  # User Frontend (Next.js - client-next)
  user-client:
    build:
      context: ./client-next
      dockerfile: Dockerfile
    container_name: staging-user-client
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - staging-network

networks:
  staging-network:
    driver: bridge

volumes:
  mysql_staging_data:
  redis_staging_data:
