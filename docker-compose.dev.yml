version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    restart: unless-stopped
    command: redis-server --requirepass root
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dev-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: dev-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      TSC_WATCHFILE: UsePolling
      DATABASE_URL: mysql://root:root@mysql:3306/app_db?allowPublicKeyRetrieval=true
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: root
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_PAYMENT_EXCHANGE: shop_events
      RABBITMQ_PAYMENT_SUCCESS_ROUTING_KEY: order.payment.success
      RABBITMQ_ADMIN_NOTIFICATION_QUEUE: admin_notification_q
      RABBITMQ_ADMIN_NOTIFICATION_DLX: admin_notification_dlx
      RABBITMQ_ADMIN_NOTIFICATION_DLQ: admin_notification_dlq
    env_file:
      - ./server/.env.development
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/generated
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dev-network
    command: sh -c "npm ci && npx prisma generate && npx prisma migrate deploy && npm run dev"

  # PayOS Reconcile Worker (periodic safety-net)
  payos-reconcile-worker:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: dev-payos-reconcile-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PAYOS_RECONCILE_INTERVAL_MS: 60000
      PAYOS_RECONCILE_BATCH_SIZE: 50
      PAYOS_RECONCILE_CONCURRENCY: 6
      PAYOS_RECONCILE_MIN_AGE_SECONDS: 30
      PAYOS_RECONCILE_MAX_AGE_HOURS: 24
      PAYOS_RECONCILE_LOCK_KEY: locks:payos-reconcile
      PAYOS_RECONCILE_LOCK_TTL_MS: 55000
      DATABASE_URL: mysql://root:root@mysql:3306/app_db?allowPublicKeyRetrieval=true
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: root
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    env_file:
      - ./server/.env.development
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/generated
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dev-network
    command: sh -c "npm ci && npx prisma generate && npm run payos:worker:dev"

  # Admin Frontend (React - client-seller)
  admin-client:
    build:
      context: ./client-seller
      dockerfile: Dockerfile.dev
    container_name: dev-admin-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./client-seller:/app
      - /app/node_modules
    networks:
      - dev-network

  # User Frontend (Next.js - client-next)
  user-client:
    build:
      context: ./client-next
      dockerfile: Dockerfile.dev
    container_name: dev-user-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "3000:3000"
    volumes:
      - ./client-next:/app
      - /app/node_modules
      - /app/.next
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  mysql_dev_data:
  redis_dev_data:
  rabbitmq_dev_data:
