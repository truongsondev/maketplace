version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    restart: unless-stopped
    command: redis-server --requirepass root
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: dev-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      TSC_WATCHFILE: UsePolling
      DATABASE_URL: mysql://root:root@mysql:3306/app_db?allowPublicKeyRetrieval=true
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: root
    env_file:
      - ./server/.env.development
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/generated
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev-network
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

  # Admin Frontend (React - client-seller)
  admin-client:
    build:
      context: ./client-seller
      dockerfile: Dockerfile.dev
    container_name: dev-admin-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./client-seller:/app
      - /app/node_modules
    networks:
      - dev-network

  # User Frontend (Next.js - client-next)
  user-client:
    build:
      context: ./client-next
      dockerfile: Dockerfile.dev
    container_name: dev-user-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "3000:3000"
    volumes:
      - ./client-next:/app
      - /app/node_modules
      - /app/.next
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  mysql_dev_data:
  redis_dev_data:
