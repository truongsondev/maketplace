version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: prod-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-app_db}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - prod-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: prod-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prod-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/${DB_NAME:-app_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENABLE_FILE_LOGGING: "true"
    env_file:
      - ./server/.env.prod
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod-network
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Frontend (React - client-seller)
  admin-client:
    build:
      context: ./client-seller
      dockerfile: Dockerfile
    container_name: prod-admin-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - prod-network

  # User Frontend (Next.js - client-next)
  user-client:
    build:
      context: ./client-next
      dockerfile: Dockerfile
    container_name: prod-user-client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - prod-network
networks:
  prod-network:
    driver: bridge

volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  backend_logs:
    driver: local
